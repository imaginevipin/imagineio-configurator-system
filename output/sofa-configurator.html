<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofa Configurator — imagine.io</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block">
  <style>
    @font-face { font-family: 'PP Neue Montreal'; src: url('../assets/fonts/PPNeueMontreal-Light.otf') format('opentype'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'PP Neue Montreal'; src: url('../assets/fonts/PPNeueMontreal-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'PP Neue Montreal'; src: url('../assets/fonts/PPNeueMontreal-Book.otf') format('opentype'); font-weight: 450; font-style: normal; }
    @font-face { font-family: 'PP Neue Montreal'; src: url('../assets/fonts/PPNeueMontreal-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'PP Neue Montreal'; src: url('../assets/fonts/PPNeueMontreal-SemiBold.otf') format('opentype'); font-weight: 600; font-style: normal; }
    @font-face { font-family: 'PP Neue Montreal'; src: url('../assets/fonts/PPNeueMontreal-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

    /* ===== PDS TOKENS ===== */
    :root {
      --surface-primary-default:             #ec4e0b;
      --surface-primary-default-hover:       #bd3e09;
      --surface-primary-default-subtle:      #fbdcce;
      --surface-primary-default-subtle-hover:#f7b89d;
      --text-primary-default:                #ec4e0b;
      --text-primary-on-color:               #ffffff;
      --border-primary-default:              #ec4e0b;
      --border-primary-default-subtle-hover: #f7b89d;
      --border-primary-focus:                #ec4e0b;
      --icons-primary-default:               #ec4e0b;

      --surface-default:           #ffffff;
      --surface-page:              #ffffff;
      --surface-page-secondary:    #f0efed;
      --surface-default-secondary: #f6f6f6;
      --surface-disabled-disabled: #cccccc;

      --text-default-heading:      #1a1a1a;
      --text-default-body:         #4d4d4d;
      --text-default-caption:      #7f7f7f;
      --text-disabled-default:     #b2b2b2;

      --border-default:            #ebebeb;
      --border-default-secondary:  #e0e0e0;
      --border-disabled-disabled:  #cccccc;

      --surface-error-default:        #ec0b38;
      --surface-error-default-subtle: #fbced7;
      --text-error-default:           #bd092d;
      --border-error-default:         #ec0b38;

      --br-100: 4px;
      --br-200: 8px;

      --s-100: 4px;  --s-200: 8px;  --s-300: 12px; --s-400: 16px;
      --s-500: 20px; --s-600: 24px; --s-700: 28px; --s-800: 32px;
      --s-1000: 40px;--s-1100: 48px;

      --z-action-icons:     10;
      --z-sticky-cta:      100;
      --z-overlay-backdrop:200;
      --z-overlay-panel:   210;

      --font-primary: 'PP Neue Montreal', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Top bar height */
      --top-bar-h: 52px;
      /* Left panel width */
      --panel-w: 260px;
    }
    @media (min-width: 1024px) { :root { --panel-w: 272px; } }
    @media (min-width: 1440px) { :root { --panel-w: 288px; } }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-primary);
      color: var(--text-default-body);
      background: var(--surface-page);
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    .material-symbols-outlined { font-size: 18px; line-height: 1; user-select: none; }

    /* ===== OUTER SHELL ===== */
    .configurator {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      height: var(--top-bar-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 var(--s-400);
      background: var(--surface-default);
      border-bottom: 1px solid var(--border-default);
      gap: var(--s-300);
      z-index: var(--z-action-icons);
    }

    /* Brand (left) */
    .top-bar-brand {
      display: flex;
      align-items: center;
      gap: var(--s-300);
      width: var(--panel-w);
      flex-shrink: 0;
      padding-right: var(--s-300);
      border-right: 1px solid var(--border-default);
    }
    .brand-logo {
      width: 26px;
      height: 26px;
      display: block;
      flex-shrink: 0;
    }
    .brand-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-default-heading);
      white-space: nowrap;
    }

    /* Tools (center — fills remaining space) */
    .top-bar-tools {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-200);
    }

    /* View toggle (2D / 3D) */
    .view-toggle {
      display: flex;
      background: var(--surface-default-secondary);
      border-radius: var(--br-100);
      padding: 3px;
      gap: 2px;
    }
    .view-btn {
      height: 28px;
      padding: 0 var(--s-300);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border-radius: calc(var(--br-100) - 1px);
      color: var(--text-default-body);
      transition: background 150ms ease-out, color 150ms ease-out;
    }
    .view-btn.is-active {
      background: var(--surface-primary-default);
      color: var(--text-primary-on-color);
    }
    @media (hover: hover) {
      .view-btn:not(.is-active):hover {
        background: var(--surface-primary-default-subtle);
        color: var(--text-primary-default);
      }
    }
    .view-btn:focus-visible { outline: 2px solid var(--border-primary-focus); outline-offset: 2px; }

    /* Toolbar divider */
    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: var(--border-default-secondary);
      flex-shrink: 0;
      margin: 0 var(--s-100);
    }

    /* Icon button (toolbar) */
    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--br-100);
      color: var(--text-default-body);
      transition: background 150ms ease-out, color 150ms ease-out;
      position: relative;
    }
    .icon-btn .material-symbols-outlined { font-size: 17px; }
    .icon-btn:disabled {
      color: var(--text-disabled-default);
      cursor: not-allowed;
    }
    .icon-btn.is-active {
      background: var(--surface-primary-default-subtle);
      color: var(--text-primary-default);
    }
    @media (hover: hover) {
      .icon-btn:not(:disabled):not(.is-active):hover {
        background: var(--surface-default-secondary);
      }
      .icon-btn:not(:disabled).is-active:hover {
        background: var(--border-primary-default-subtle-hover);
      }
    }
    .icon-btn:focus-visible { outline: 2px solid var(--border-primary-focus); outline-offset: 2px; }

    /* Danger icon btn */
    .icon-btn--danger:not(:disabled) { color: var(--text-error-default); }
    @media (hover: hover) {
      .icon-btn--danger:not(:disabled):hover {
        background: var(--surface-error-default-subtle);
        color: var(--text-error-default);
      }
    }

    /* Generate CTA (top-right) */
    .top-bar-actions { flex-shrink: 0; }
    .btn-generate {
      height: 36px;
      padding: 0 var(--s-500);
      background: var(--surface-primary-default);
      color: var(--text-primary-on-color);
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--br-200);
      display: flex;
      align-items: center;
      gap: var(--s-200);
      transition: background 150ms ease-out;
      white-space: nowrap;
    }
    .btn-generate .material-symbols-outlined { font-size: 15px; }
    @media (hover: hover) { .btn-generate:hover { background: var(--surface-primary-default-hover); } }
    .btn-generate:focus-visible { outline: 2px solid var(--border-primary-focus); outline-offset: 2px; }

    /* ===== MAIN AREA ===== */
    .main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ===== LEFT PANEL ===== */
    .control-zone {
      width: var(--panel-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface-default);
      border-right: 1px solid var(--border-default);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-default-secondary) transparent;
    }
    .control-zone::-webkit-scrollbar { width: 4px; }
    .control-zone::-webkit-scrollbar-track { background: transparent; }
    .control-zone::-webkit-scrollbar-thumb { background: var(--border-default-secondary); border-radius: 4px; }

    /* Panel section */
    .panel-section {
      padding: var(--s-400) var(--s-400) var(--s-500);
      border-bottom: 1px solid var(--border-default);
    }
    .panel-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-default-caption);
      margin-bottom: var(--s-300);
      display: block;
    }

    /* Module cards — 3-up grid */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--s-200);
    }

    .module-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--s-200) var(--s-100);
      background: var(--surface-page-secondary);
      border: 1.5px solid transparent;
      border-radius: var(--br-200);
      cursor: pointer;
      gap: var(--s-100);
      transition: border-color 150ms ease-out, background 150ms ease-out;
      min-height: 72px;
    }
    .module-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
    }
    .module-name {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-default-body);
      text-align: center;
      line-height: 13px;
    }
    .module-card:active { transform: scale(0.96); }
    .module-card:focus-visible { outline: 2px solid var(--border-primary-focus); outline-offset: 2px; }
    @media (hover: hover) {
      .module-card:hover {
        border-color: var(--border-primary-default);
        background: var(--surface-primary-default-subtle);
      }
    }

    /* Fabric grid — 2-up */
    .fabric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-200);
    }
    .fabric-card {
      border: 1.5px solid var(--border-default-secondary);
      border-radius: var(--br-200);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 150ms ease-out;
    }
    .fabric-card:focus-visible { outline: 2px solid var(--border-primary-focus); outline-offset: 2px; }
    .fabric-swatch { height: 48px; width: 100%; display: block; }
    .fabric-card-label {
      padding: var(--s-100) var(--s-200) var(--s-200);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-default-body);
    }
    .fabric-card.is-selected { border: 2px solid var(--border-primary-default); }
    @media (hover: hover) {
      .fabric-card:hover { border-color: var(--border-primary-default-subtle-hover); }
    }

    /* ===== VISUAL ZONE ===== */
    .visual-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface-page-secondary);
      overflow: hidden;
      position: relative;
      min-width: 0;
    }

    /* Canvas */
    .canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    .canvas-inner {
      width: 100%;
      height: 100%;
      transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    .canvas-area.view-3d .canvas-inner {
      transform: perspective(900px) rotateX(42deg) rotateZ(-14deg) scale(0.76);
      transform-origin: center 40%;
    }
    .assembly-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Canvas hint */
    .canvas-hint {
      position: absolute;
      bottom: var(--s-500);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,26,26,0.68);
      color: #fff;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2px;
      padding: var(--s-100) var(--s-400);
      border-radius: 100px;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 400ms ease;
    }
    .canvas-hint.is-hidden { opacity: 0; }

    /* Toast */
    .toast {
      position: absolute;
      top: var(--s-400);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--surface-error-default-subtle);
      border: 1px solid var(--border-error-default);
      color: var(--text-error-default);
      font-size: 12px;
      font-weight: 500;
      padding: var(--s-200) var(--s-400);
      border-radius: var(--br-200);
      z-index: var(--z-action-icons);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease, transform 200ms ease;
      white-space: nowrap;
    }
    .toast.is-visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Dimensions bar */
    .dimensions-bar {
      display: flex;
      align-items: center;
      gap: var(--s-600);
      padding: var(--s-200) var(--s-500);
      background: var(--surface-default);
      border-top: 1px solid var(--border-default);
      flex-shrink: 0;
    }
    .dim-item { display: flex; align-items: center; gap: var(--s-200); }
    .dim-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-default-caption);
    }
    .dim-value {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-default-heading);
    }
    .dim-item--right { margin-left: auto; }

    /* Live status badge (bottom-right, matches kitchen "LIVE STATUS • STABLE") */
    .live-status {
      position: fixed;
      bottom: var(--s-400);
      right: var(--s-400);
      display: flex;
      align-items: center;
      gap: var(--s-200);
      background: var(--surface-default);
      border: 1px solid var(--border-default-secondary);
      border-radius: 100px;
      padding: var(--s-100) var(--s-300);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-default-caption);
      pointer-events: none;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00b64c;
      flex-shrink: 0;
    }

    /* ===== OUTPUT MODAL ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20,20,20,0.52);
      z-index: var(--z-overlay-backdrop);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-400);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }
    .modal-backdrop.is-open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface-default);
      border-radius: var(--br-200);
      width: 100%;
      max-width: 580px;
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 48px rgba(0,0,0,0.18);
      transform: translateY(14px);
      transition: transform 200ms ease;
    }
    .modal-backdrop.is-open .modal { transform: translateY(0); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--s-500) var(--s-600);
      border-bottom: 1px solid var(--border-default);
      flex-shrink: 0;
    }
    .modal-title { font-size: 18px; font-weight: 600; color: var(--text-default-heading); }
    .modal-close-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--br-100);
      color: var(--text-default-body);
      transition: background 150ms ease-out;
    }
    @media (hover: hover) { .modal-close-btn:hover { background: var(--surface-default-secondary); } }
    .modal-close-btn:focus-visible { outline: 2px solid var(--border-primary-focus); outline-offset: 2px; }
    .modal-body { padding: var(--s-600); overflow-y: auto; flex: 1; }
    .output-section { margin-bottom: var(--s-600); }
    .output-section:last-child { margin-bottom: 0; }
    .output-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-default-caption);
      margin-bottom: var(--s-300);
    }
    .output-dims { display: flex; gap: var(--s-300); }
    .dim-card {
      flex: 1;
      padding: var(--s-400);
      text-align: center;
      background: var(--surface-page-secondary);
      border-radius: var(--br-200);
    }
    .dim-card-num { font-size: 22px; font-weight: 600; color: var(--text-default-heading); }
    .dim-card-label { font-size: 10px; font-weight: 400; color: var(--text-default-caption); margin-top: 4px; }
    .output-json {
      background: var(--text-default-heading);
      color: #d4d4d4;
      border-radius: var(--br-200);
      padding: var(--s-500);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre;
    }
    .modal-footer {
      padding: var(--s-400) var(--s-600);
      border-top: 1px solid var(--border-default);
      display: flex;
      gap: var(--s-300);
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .btn-modal-copy {
      height: 38px;
      padding: 0 var(--s-400);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border-primary-default);
      color: var(--text-primary-default);
      border-radius: var(--br-100);
      display: flex;
      align-items: center;
      gap: var(--s-200);
      transition: background 150ms ease-out;
    }
    @media (hover: hover) { .btn-modal-copy:hover { background: var(--surface-primary-default-subtle); } }
    .btn-modal-close {
      height: 38px;
      padding: 0 var(--s-500);
      font-size: 13px;
      font-weight: 600;
      background: var(--surface-primary-default);
      color: var(--text-primary-on-color);
      border-radius: var(--br-100);
      display: flex;
      align-items: center;
      transition: background 150ms ease-out;
    }
    @media (hover: hover) { .btn-modal-close:hover { background: var(--surface-primary-default-hover); } }

    /* ===== ACCESSIBILITY ===== */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div class="configurator" role="region" aria-label="Sofa Configurator">

  <!-- ===== TOP BAR ===== -->
  <header class="top-bar" role="banner">

    <!-- Brand -->
    <div class="top-bar-brand">
      <img src="../assets/logos/Mark.svg" class="brand-logo" alt="imagine.io" />
      <span class="brand-title">Sofa Configurator</span>
    </div>

    <!-- Toolbar (center) -->
    <nav class="top-bar-tools" aria-label="Canvas tools">

      <!-- View toggle -->
      <div class="view-toggle" role="group" aria-label="View mode">
        <button class="view-btn is-active" data-view="2d" aria-pressed="true">2D</button>
        <button class="view-btn" data-view="3d" aria-pressed="false">3D</button>
      </div>

      <div class="toolbar-divider" role="separator"></div>

      <!-- Module manipulation icons (enabled when a module is selected) -->
      <div role="group" aria-label="Module controls" style="display:flex;gap:2px;">
        <button class="icon-btn" id="btn-move-left" title="Move Left" aria-label="Move module left" disabled>
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <button class="icon-btn" id="btn-move-right" title="Move Right" aria-label="Move module right" disabled>
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
        <button class="icon-btn" id="btn-rotate" title="Rotate Module" aria-label="Rotate module" disabled>
          <span class="material-symbols-outlined">rotate_right</span>
        </button>
        <button class="icon-btn icon-btn--danger" id="btn-delete" title="Delete Module" aria-label="Delete module" disabled>
          <span class="material-symbols-outlined">delete</span>
        </button>
      </div>

      <div class="toolbar-divider" role="separator"></div>

      <!-- Canvas utility icons -->
      <div role="group" aria-label="Canvas settings" style="display:flex;gap:2px;">
        <button class="icon-btn is-active" id="btn-snap" title="Snap to Grid" aria-label="Toggle snap to grid" aria-pressed="true">
          <span class="material-symbols-outlined">grid_4x4</span>
        </button>
        <button class="icon-btn" id="btn-reset" title="Reset Configuration" aria-label="Reset to default configuration">
          <span class="material-symbols-outlined">restart_alt</span>
        </button>
      </div>

    </nav>

    <!-- CTA -->
    <div class="top-bar-actions">
      <button class="btn-generate" id="btn-generate" aria-label="Generate configuration output">
        <span class="material-symbols-outlined">download</span>
        Generate Output
      </button>
    </div>

  </header><!-- /top-bar -->

  <!-- ===== MAIN AREA ===== -->
  <div class="main-area">

    <!-- LEFT PANEL -->
    <aside class="control-zone" aria-label="Configuration panel">

      <!-- Seating Units -->
      <div class="panel-section">
        <span class="section-label">Seating Units</span>
        <div class="module-grid" role="list">

          <button class="module-card" role="listitem"
                  data-type="armless" aria-label="Armless Seat — click to add">
            <div class="module-icon">
              <svg width="60" height="30" viewBox="0 0 68 36" fill="none">
                <rect x="0.5" y="0.5" width="67" height="35" rx="3.5" fill="#c8bfb0" stroke="#a89c8a"/>

<div class="modal-backdrop" id="modal-backdrop"
     role="dialog" aria-modal="true" aria-labelledby="modal-title-id">

<script>
  // ===== FABRIC PALETTE =====
  const FABRICS = {
    beige:       { label: 'Beige',       base: '#c4b49a', dark: '#9e8e78', light: '#d8cfc1', shadow: '#b0a08a', mid: '#ccc0ac' },
    'dark-grey': { label: 'Dark Grey',   base: '#3d3d3d', dark: '#242424', light: '#555555', shadow: '#2e2e2e', mid: '#464646' },
    navy:        { label: 'Navy Blue',   base: '#1e2f50', dark: '#111c32', light: '#283d64', shadow: '#182540', mid: '#22345a' },
    olive:       { label: 'Olive Green', base: '#4a5240', dark: '#2e3228', light: '#606c53', shadow: '#3c4235', mid: '#545d48' }
  };

  // ===== MODULE DEFINITIONS =====
  const MODS = {
    armless:     { label: 'Armless Seat',     w: 108, d: 86, cat: 'seating' },
    'end-left':  { label: 'End Seat (Left)',  w: 108, d: 86, cat: 'seating' },
    'end-right': { label: 'End Seat (Right)', w: 108, d: 86, cat: 'seating' },
    corner:      { label: 'Corner Unit',      w: 86,  d: 86, cat: 'seating' },
    ottoman:     { label: 'Ottoman',          w: 86,  d: 70, cat: 'extension' }
  };
  const GAP = 3;
  const PX_TO_IN = 30 / 108;

  // ===== STATE =====
  const state = {
    config: [],
    fabric: 'beige',
    selected: null,
    viewMode: '2d',
    snapGrid: true,
    _uid: 1
  };

  function mkMod(type) { return { type, id: `m${state._uid++}`, rotation: 0 }; }

  // ===== DEFAULT =====
  function loadDefault() {
    state.config = [mkMod('armless'), mkMod('corner'), mkMod('armless'), mkMod('ottoman')];
    state.selected = null;
    state.fabric = 'beige';
  }

  // ===== VALIDATION =====
  function validate(cfg) {
    if (cfg.length < 2) return 'Minimum 2 modules required.';
    for (let i = 0; i < cfg.length - 1; i++) {
      if (cfg[i].type === 'corner' && cfg[i+1].type === 'corner')
        return 'Corner units cannot connect directly.';
    }
    for (let i = 1; i < cfg.length - 1; i++) {
      if (cfg[i].type === 'ottoman') {
        const seat = t => ['armless','end-left','end-right','corner'].includes(t);
        if (seat(cfg[i-1].type) && seat(cfg[i+1].type))
          return 'Ottoman cannot sit between two seat units.';
      }
    }
    return null;
  }

  // ===== LAYOUT =====
  function calcLayout(cfg) {
    let x = 0, y = 0, dir = 'east', southX = 0, cornerSeen = false;
    return cfg.map((mod, i) => {
      const def = MODS[mod.type];
      if (dir === 'east') {
        const pos = { x, y, dir, mod, def, idx: i };
        if (mod.type === 'corner' && !cornerSeen) {
          cornerSeen = true; southX = x; y += def.d + GAP; dir = 'south';
        } else { x += def.w + GAP; }
        return pos;
      } else {
        const pos = { x: southX, y, dir, mod, def, idx: i };
        y += def.w + GAP;
        return pos;
      }
    });
  }

  // ===== SVG HELPERS =====
  const NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
    return e;
  }

  // ===== DRAW MODULE =====
  function drawModule(pos, isSelected) {
    const { x, y, dir, mod, def } = pos;
    const f = FABRICS[state.fabric];
    const sw = isSelected ? '2.5' : '1.5';
    const sc = isSelected ? '#ec4e0b' : 'rgba(0,0,0,0.12)';
    const w = def.w, d = def.d;

    const g = el('g', {
      'data-idx': pos.idx, tabindex: '0', role: 'button',
      'aria-label': `${def.label}, position ${pos.idx + 1}${isSelected ? ', selected' : ''}`,
      'aria-pressed': isSelected ? 'true' : 'false', style: 'cursor:pointer'
    });
    g.setAttribute('transform', dir === 'south'
      ? `translate(${x + def.d},${y}) rotate(90)` : `translate(${x},${y})`);

    if (mod.type === 'armless') {
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:f.base }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:26, rx:4, fill:f.dark }));
      g.appendChild(el('line', { x1:0, y1:26, x2:w, y2:26, stroke:f.shadow, 'stroke-width':'1' }));
      g.appendChild(el('line', { x1:w/2, y1:27, x2:w/2, y2:d, stroke:f.shadow, 'stroke-width':'1.2', 'stroke-dasharray':'5 3' }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:'none', stroke:sc, 'stroke-width':sw }));

    } else if (mod.type === 'end-left') {
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:f.base }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:26, rx:4, fill:f.dark }));
      g.appendChild(el('line', { x1:0, y1:26, x2:w, y2:26, stroke:f.shadow, 'stroke-width':'1' }));
      g.appendChild(el('rect', { x:0, y:26, width:15, height:d-26, rx:2, fill:f.shadow }));
      g.appendChild(el('line', { x1:(w+15)/2, y1:27, x2:(w+15)/2, y2:d, stroke:f.shadow, 'stroke-width':'1.2', 'stroke-dasharray':'5 3' }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:'none', stroke:sc, 'stroke-width':sw }));

    } else if (mod.type === 'end-right') {
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:f.base }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:26, rx:4, fill:f.dark }));
      g.appendChild(el('line', { x1:0, y1:26, x2:w, y2:26, stroke:f.shadow, 'stroke-width':'1' }));
      g.appendChild(el('rect', { x:w-15, y:26, width:15, height:d-26, rx:2, fill:f.shadow }));
      g.appendChild(el('line', { x1:(w-15)/2, y1:27, x2:(w-15)/2, y2:d, stroke:f.shadow, 'stroke-width':'1.2', 'stroke-dasharray':'5 3' }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:'none', stroke:sc, 'stroke-width':sw }));

    } else if (mod.type === 'corner') {
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:f.base }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:26, rx:4, fill:f.dark }));
      g.appendChild(el('rect', { x:0, y:0, width:26, height:d, rx:4, fill:f.dark }));
      g.appendChild(el('rect', { x:0, y:0, width:26, height:26, fill:f.shadow, rx:3 }));
      g.appendChild(el('line', { x1:26, y1:d, x2:w, y2:26, stroke:f.shadow, 'stroke-width':'1', 'stroke-dasharray':'4 3', opacity:'0.45' }));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:4, fill:'none', stroke:sc, 'stroke-width':sw }));

    } else if (mod.type === 'ottoman') {
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:6, fill:f.base }));
      g.appendChild(el('rect', { x:8, y:8, width:w-16, height:d-16, rx:4, fill:f.light, opacity:'0.65' }));
      [[w/3,d/3],[2*w/3,d/3],[w/3,2*d/3],[2*w/3,2*d/3]].forEach(([cx,cy]) =>
        g.appendChild(el('circle', { cx, cy, r:'2.5', fill:f.shadow })));
      g.appendChild(el('rect', { x:0, y:0, width:w, height:d, rx:6, fill:'none', stroke:sc, 'stroke-width':sw }));
    }

    // Transparent hit area
    g.appendChild(el('rect', { x:0, y:0, width:w, height:d, fill:'transparent', 'data-idx': pos.idx }));
    return g;
  }

  // ===== RENDER =====
  function render() {
    const group = document.getElementById('assembly-group');
    group.innerHTML = '';
    const svg = document.getElementById('assembly-svg');
    const cw = svg.clientWidth  || 800;
    const ch = svg.clientHeight || 500;

    if (!state.config.length) { syncUI(); return; }

    const positions = calcLayout(state.config);
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    positions.forEach(pos => {
      const sw = pos.dir==='south' ? pos.def.d : pos.def.w;
      const sh = pos.dir==='south' ? pos.def.w : pos.def.d;
      minX=Math.min(minX,pos.x); minY=Math.min(minY,pos.y);
      maxX=Math.max(maxX,pos.x+sw); maxY=Math.max(maxY,pos.y+sh);
    });

    const asmW = maxX-minX || 1, asmH = maxY-minY || 1;
    const PAD = 72;
    const scale = Math.min((cw-PAD*2)/asmW, (ch-PAD*2)/asmH, 2.4);
    const offX = (cw - asmW*scale)/2 - minX*scale;
    const offY = (ch - asmH*scale)/2 - minY*scale;
    group.setAttribute('transform', `translate(${offX},${offY}) scale(${scale})`);

    positions.forEach((pos, i) => {
      const g = drawModule(pos, state.selected === i);
      group.appendChild(g);
    });
    syncUI();
  }

  // ===== DIMENSIONS =====
  function calcDims() {
    const pos = calcLayout(state.config);
    if (!pos.length) return { w:0, d:0 };
    let mx=0, my=0;
    pos.forEach(p => {
      mx = Math.max(mx, p.x + (p.dir==='south' ? p.def.d : p.def.w));
      my = Math.max(my, p.y + (p.dir==='south' ? p.def.w : p.def.d));
    });
    return { w: Math.round(mx*PX_TO_IN), d: Math.round(my*PX_TO_IN) };
  }

  // ===== SYNC UI (toolbar + dims bar) =====
  function syncUI() {
    const n = state.config.length;
    const dims = calcDims();
    const fab = FABRICS[state.fabric]?.label || 'Beige';
    const sel = state.selected;

    // Dimensions bar
    document.getElementById('bar-count').textContent = n;
    document.getElementById('bar-width').textContent = dims.w ? `${dims.w}"` : '—';
    document.getElementById('bar-depth').textContent = dims.d ? `${dims.d}"` : '—';
    document.getElementById('bar-fabric').textContent = fab;

    // Toolbar module controls
    const hasSelection = sel !== null;
    const type = hasSelection ? state.config[sel]?.type : null;

    document.getElementById('btn-move-left').disabled  = !hasSelection || sel === 0;
    document.getElementById('btn-move-right').disabled = !hasSelection || sel === n-1;
    document.getElementById('btn-rotate').disabled     = !hasSelection || !['corner','ottoman'].includes(type);
    document.getElementById('btn-delete').disabled     = !hasSelection || n <= 2;
  }

  // ===== TOAST =====
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('is-visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('is-visible'), 3200);
  }

  // ===== HINT =====
  let hintGone = false;
  function dismissHint() {
    if (hintGone) return;
    hintGone = true;
    document.getElementById('canvas-hint').classList.add('is-hidden');
  }

  // ===== VIEW TOGGLE =====
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.viewMode = btn.dataset.view;
      document.querySelectorAll('.view-btn').forEach(b => {
        b.classList.remove('is-active'); b.setAttribute('aria-pressed','false');
      });
      btn.classList.add('is-active'); btn.setAttribute('aria-pressed','true');
      document.getElementById('canvas-area').classList.toggle('view-3d', state.viewMode==='3d');
    });
  });

  // ===== SNAP GRID =====
  document.getElementById('btn-snap').addEventListener('click', () => {
    state.snapGrid = !state.snapGrid;
    const b = document.getElementById('btn-snap');
    b.classList.toggle('is-active', state.snapGrid);
    b.setAttribute('aria-pressed', String(state.snapGrid));
    document.getElementById('grid-bg').setAttribute('fill', state.snapGrid ? 'url(#grid-dots)' : 'none');
  });

  // ===== RESET =====
  function resetConfig() {
    loadDefault();
    document.querySelectorAll('.fabric-card').forEach(c => {
      const on = c.dataset.fabric === 'beige';
      c.classList.toggle('is-selected', on);
      c.setAttribute('aria-checked', String(on));
    });
    render();
  }
  document.getElementById('btn-reset').addEventListener('click', resetConfig);

  // ===== MODULE CARDS (add) =====
  document.querySelectorAll('.module-card').forEach(card => {
    const add = () => {
      const test = [...state.config, mkMod(card.dataset.type)];
      const err = validate(test);
      if (err) { showToast(err); return; }
      state.config.push(mkMod(card.dataset.type));
      state.selected = state.config.length - 1;
      dismissHint();
      render();
    };
    card.addEventListener('click', add);
    card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); add(); } });
  });

  // ===== CANVAS CLICK — SELECT =====
  document.getElementById('assembly-group').addEventListener('click', e => {
    const el2 = e.target.closest('[data-idx]');
    if (!el2) { state.selected = null; render(); return; }
    const i = parseInt(el2.getAttribute('data-idx'), 10);
    state.selected = state.selected === i ? null : i;
    render();
  });

  document.getElementById('assembly-group').addEventListener('keydown', e => {
    const el2 = e.target.closest('[data-idx]');
    if (!el2) return;
    if (e.key==='Enter'||e.key===' ') {
      e.preventDefault();
      const i = parseInt(el2.getAttribute('data-idx'), 10);
      state.selected = state.selected===i ? null : i;
      render();
    }
    if (e.key==='Delete'||e.key==='Backspace') { e.preventDefault(); document.getElementById('btn-delete').click(); }
  });

  document.getElementById('assembly-svg').addEventListener('click', e => {
    if (e.target.id==='assembly-svg'||e.target.id==='grid-bg') { state.selected=null; render(); }
  });

  // ===== TOOLBAR CONTROLS =====
  document.getElementById('btn-move-left').addEventListener('click', () => {
    const i = state.selected;
    if (i===null||i===0) return;
    [state.config[i-1],state.config[i]] = [state.config[i],state.config[i-1]];
    const err = validate(state.config);
    if (err) { [state.config[i-1],state.config[i]]=[state.config[i],state.config[i-1]]; showToast(err); render(); return; }
    state.selected = i-1; render();
  });

  document.getElementById('btn-move-right').addEventListener('click', () => {
    const i = state.selected;
    if (i===null||i>=state.config.length-1) return;
    [state.config[i],state.config[i+1]] = [state.config[i+1],state.config[i]];
    const err = validate(state.config);
    if (err) { [state.config[i],state.config[i+1]]=[state.config[i+1],state.config[i]]; showToast(err); render(); return; }
    state.selected = i+1; render();
  });

  document.getElementById('btn-rotate').addEventListener('click', () => {
    if (state.selected===null) return;
    state.config[state.selected].rotation = (state.config[state.selected].rotation+90)%360;
    render();
  });

  document.getElementById('btn-delete').addEventListener('click', () => {
    if (state.selected===null) return;
    if (state.config.length<=2) { showToast('Minimum 2 modules required.'); return; }
    state.config.splice(state.selected, 1);
    state.selected = null; render();
  });

  // ===== FABRIC =====
  document.querySelectorAll('.fabric-card').forEach(card => {
    const pick = () => {
      state.fabric = card.dataset.fabric;
      document.querySelectorAll('.fabric-card').forEach(c => {
        c.classList.remove('is-selected'); c.setAttribute('aria-checked','false');
      });
      card.classList.add('is-selected'); card.setAttribute('aria-checked','true');
      render();
    };
    card.addEventListener('click', pick);
    card.addEventListener('keydown', e => {
      if (e.key==='Enter'||e.key===' ') { e.preventDefault(); pick(); }
      const cards = Array.from(document.querySelectorAll('.fabric-card'));
      const idx = cards.indexOf(card);
      if (e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); const n=cards[(idx+1)%cards.length]; n.focus(); n.click(); }
      if (e.key==='ArrowLeft'||e.key==='ArrowUp')    { e.preventDefault(); const p=cards[(idx-1+cards.length)%cards.length]; p.focus(); p.click(); }
    });
  });

  // ===== GENERATE =====
  function openModal() {
    const dims = calcDims();
    const fab  = FABRICS[state.fabric];
    const data = {
      fabric:     { id: state.fabric, label: fab.label },
      dimensions: { width_in: dims.w, depth_in: dims.d },
      modules:    state.config.map((m,i) => ({ position:i+1, type:m.type, label:MODS[m.type].label, id:m.id, rotation:m.rotation }))
    };
    document.getElementById('out-width').textContent  = `${dims.w}"`;
    document.getElementById('out-depth').textContent  = `${dims.d}"`;
    document.getElementById('out-count').textContent  = state.config.length;
    document.getElementById('output-json-pre').textContent = JSON.stringify(data, null, 2);
    document.getElementById('modal-backdrop').classList.add('is-open');
    document.getElementById('btn-modal-close').focus();
  }
  document.getElementById('btn-generate').addEventListener('click', openModal);

  // Modal close
  function closeModal() { document.getElementById('modal-backdrop').classList.remove('is-open'); }
  document.getElementById('btn-modal-close').addEventListener('click', closeModal);
  document.getElementById('btn-modal-close2').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => { if (e.target===document.getElementById('modal-backdrop')) closeModal(); });

  // Copy JSON
  document.getElementById('btn-copy-json').addEventListener('click', () => {
    navigator.clipboard?.writeText(document.getElementById('output-json-pre').textContent).then(() => {
      const b = document.getElementById('btn-copy-json');
      const o = b.innerHTML;
      b.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px">check</span>Copied!';
      setTimeout(() => { b.innerHTML = o; }, 2200);
    });
  });

  // Escape key
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') {
      if (document.getElementById('modal-backdrop').classList.contains('is-open')) closeModal();
      else if (state.selected!==null) { state.selected=null; render(); }
    }
  });

  // Resize
  let raf;
  window.addEventListener('resize', () => { cancelAnimationFrame(raf); raf=requestAnimationFrame(render); });

  // ===== INIT =====
  loadDefault();
  render();
  setTimeout(dismissHint, 2200);
</script>
</body>
</html>
